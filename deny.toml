# cargo-deny configuration. Run `cargo deny check` to apply.

[graph]
all-features = true

[advisories]
yanked = "deny"
# Only fail "unmaintained" advisories when they hit a workspace-direct
# dependency. Tauri's tree drags in ~15 unmaintained crates (gtk-rs GTK3
# bindings, proc-macro-error, unic-*, etc.) that we have no path to
# fix; flagging each one individually buries real signals. Vulnerabilities
# and yanked crates are still always fatal.
unmaintained = "workspace"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    # Mozilla's webpki-root-certs bundle is CDLA-Permissive-2.0. Pulled in
    # transitively by tauri-plugin-updater -> reqwest -> rustls-platform-verifier.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
# Tauri 2 + WebKit pull a wide tree that's slow to converge on dep
# versions. Skipping those subtrees keeps the duplicate-version warnings
# from drowning genuine issues; the crates inside still go through the
# licence + advisory checks.
skip-tree = [
    { name = "tauri", version = "=2.11.1" },
    { name = "tauri-build", version = "=2.6.1" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
