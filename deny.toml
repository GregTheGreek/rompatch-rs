# cargo-deny configuration. Run `cargo deny check` to apply.

[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # RUSTSEC-2025-0098: the unic-ucd-* crate family is unmaintained.
    # Pulled in transitively through urlpattern -> tauri-utils -> tauri.
    # Risk is "unmaintained" only - no known CVE - and the advisory says
    # "no safe upgrade is available". Re-evaluate when Tauri drops the
    # urlpattern dep or urlpattern drops the unic-ucd-* deps.
    "RUSTSEC-2025-0098",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "MPL-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
# Tauri 2 + WebKit pull a wide tree that's slow to converge on dep
# versions. Skipping those subtrees keeps the duplicate-version warnings
# from drowning genuine issues; the crates inside still go through the
# licence + advisory checks.
skip-tree = [
    { name = "tauri", version = "=2.11.1" },
    { name = "tauri-build", version = "=2.6.1" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
