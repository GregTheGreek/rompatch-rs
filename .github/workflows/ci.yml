name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - run: cargo llvm-cov report --summary-only
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  fuzz:
    name: fuzz smoke (60s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz -> fuzz/target
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: list targets
        id: targets
        run: |
          set -euo pipefail
          targets=$(cargo +nightly fuzz list --fuzz-dir fuzz)
          {
            echo "targets<<EOF"
            echo "$targets"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: run each target for 60s
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          set -euo pipefail
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            echo "::group::fuzz $t"
            cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu "$t" -- -max_total_time=60
            echo "::endgroup::"
          done <<< "$TARGETS"
