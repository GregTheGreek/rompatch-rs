name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # rompatch-gui needs a built frontend dist and (on Linux) WebKit2GTK
      # system deps. We test it in the dedicated `gui` job, so exclude here.
      - run: cargo test --workspace --all-targets --exclude rompatch-gui
      - run: cargo test --workspace --doc --exclude rompatch-gui

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --exclude rompatch-gui -- -D warnings

  gui:
    name: gui (macOS check + universal .dmg on tag)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/rompatch-gui/ui/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: gui
      - name: install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: crates/rompatch-gui/ui
      - name: typecheck frontend
        run: pnpm typecheck
        working-directory: crates/rompatch-gui/ui
      - name: build frontend dist
        run: pnpm build
        working-directory: crates/rompatch-gui/ui
      - name: cargo check + clippy (GUI)
        run: |
          cargo check -p rompatch-gui --release
          cargo clippy -p rompatch-gui --all-targets -- -D warnings
      # On tag pushes, produce a universal-apple-darwin .dmg.
      - name: install tauri-cli
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo install tauri-cli --version 2.11.1 --locked
      - name: tauri build universal .dmg
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: crates/rompatch-gui
        run: cargo tauri build --target universal-apple-darwin
      - name: upload .dmg artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: rompatch-gui-macos-universal
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --exclude rompatch-gui --lcov --output-path lcov.info
      - run: cargo llvm-cov report --summary-only
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  fuzz:
    name: fuzz smoke (60s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz -> fuzz/target
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: list targets
        id: targets
        run: |
          set -euo pipefail
          targets=$(cargo +nightly fuzz list --fuzz-dir fuzz)
          {
            echo "targets<<EOF"
            echo "$targets"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: run each target for 60s
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          set -euo pipefail
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            echo "::group::fuzz $t"
            cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu "$t" -- -max_total_time=60
            echo "::endgroup::"
          done <<< "$TARGETS"
